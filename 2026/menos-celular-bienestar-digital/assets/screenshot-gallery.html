<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reportes Digital Wellbeing</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0.75rem 0.5rem 1rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.35;
      color: #e6edf3;
      background: #0d1117;
    }
    .hint {
      margin: 0 0 0.75rem;
      opacity: 0.75;
      font-size: 12px;
    }
    .period {
      margin: 1rem 0 0.35rem;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.65;
    }
    .period:first-of-type { margin-top: 0; }
    .strip {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 0.75rem;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.25rem 0.25rem 0.75rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .card {
      flex: 0 0 auto;
      scroll-snap-align: start;
      width: 142px;
      margin: 0;
    }
    .card img {
      display: block;
      width: auto;
      height: 360px;
      max-width: none;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: #161b22;
    }
    .card figcaption {
      margin-top: 0.4rem;
      font-size: 11px;
      line-height: 1.35;
      opacity: 0.9;
    }
    .card strong { font-weight: 600; }
    html, body { overflow: hidden; }
  </style>
</head>
<body>
  <p class="hint">Deslizá horizontalmente →</p>

  <p class="period">Noviembre–diciembre 2025</p>
  <div class="strip" aria-label="Noviembre–diciembre 2025">
    <figure class="card">
      <img src="semana-47-nov-2025-2h24m.webp" alt="Semana 47 — 2 h 24 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S47</strong> — 2 h 24 m. Bajando; algunos días 3–4 h.</figcaption>
    </figure>
    <figure class="card">
      <img src="semana-48-1h26m.webp" alt="Semana 48 — 1 h 26 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S48</strong> — ~1 h 26 m.</figcaption>
    </figure>
    <figure class="card">
      <img src="semana-49-1h06m.webp" alt="Semana 49 — 1 h 6 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S49</strong> — ~1 h 6 m; 6/7 días en meta.</figcaption>
    </figure>
  </div>

  <div class="strip" aria-label="Febrero–abril 2026">

      <img src="semana-09-feb-38m.webp" alt="Semana 9 — 38 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S9</strong> — 38 m.</figcaption>
    </figure>
    <figure class="card">
      <img src="semana-14-1h33m.webp" alt="Semana 14 — 1 h 33 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S14</strong> — ~1 h 33 m.</figcaption>
    </figure>
    <figure class="card">
      <img src="semana-15-1h20m.webp" alt="Semana 15 — 1 h 20 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S15</strong> — ~1 h 20 m.</figcaption>
    </figure>
    <figure class="card">
      <img src="semana-16-1h02m-7-dias.webp" alt="Semana 16 — 1 h 2 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S16</strong> — ~1 h 2 m; 7/7.</figcaption>
    </figure>
    <figure class="card">
      <img src="semana-17-1h28m.webp" alt="Semana 17 — 1 h 28 m" width="399" height="1024" loading="lazy" />

    <figure class="card">
      <img src="semana-19-1h27m.webp" alt="Semana 19 — 1 h 27 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S19</strong> — ~1 h 27 m.</figcaption>
    </figure>
    <figure class="card">
      <img src="semana-20-1h06m-7-dias.webp" alt="Semana 20 — 1 h 6 m" width="399" height="1024" loading="lazy" />

    <figure class="card">
      <img src="semana-21-43m-7-dias.webp" alt="Semana 21 — 43 m" width="399" height="1024" loading="lazy" />
      <figcaption><strong>S21</strong> — 43 m; 7/7.</figcaption>
    </figure>
  </div>
  <script>
    (function () {
      function resizeFrame() {
        var frame = window.frameElement;
        if (!frame) return;
        var h = Math.ceil(document.documentElement.scrollHeight);
        frame.style.height = h + 'px';
      }
      function schedule() {
        requestAnimationFrame(resizeFrame);
      }
      window.addEventListener('load', schedule);
      window.addEventListener('resize', schedule);
      document.querySelectorAll('.card img').forEach(function (img) {
        if (img.complete) schedule();
        else img.addEventListener('load', schedule);
      });
      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(schedule).observe(document.body);
      }
      schedule();
    })();
  </script>
</body>
</html>
