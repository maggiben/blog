<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>MediaPipe Hands — demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/controls_3d.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .abs { position: absolute; }

    a { color: white; text-decoration: none; }
    a:hover { color: lightblue; }

    body {
      font-family: 'Titillium Web', sans-serif;
      color: white;
      background-color: #596e73;
    }

    .container {
      position: absolute;
      inset: 0;
      background-color: #596e73;
    }

    .input_video {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .input_video.selfie {
      transform: scale(-1, 1);
    }

    .output_canvas {
      width: 100%;
      display: block;
      position: relative;
      left: 0;
      top: 0;
    }

    .control-panel {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 4;
      max-width: min(320px, calc(100% - 140px));
      max-height: calc(100% - 20px);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .loading {
      display: flex;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      align-items: center;
      backface-visibility: hidden;
      justify-content: center;
      opacity: 1;
      transition: opacity 1s;
      z-index: 3;
    }

    .loading .message { font-size: x-large; }

    .loading .spinner {
      position: absolute;
      width: 120px;
      height: 120px;
      animation: spin 1s linear infinite;
      border: 32px solid #bebebe;
      border-top: 32px solid #3498db;
      border-radius: 50%;
    }

    .loaded .loading { opacity: 0; pointer-events: none; }

    .shoutout {
      left: 0;
      right: 0;
      bottom: 12px;
      text-align: center;
      font-size: clamp(14px, 2.5vw, 20px);
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }

    .shoutout a {
      pointer-events: auto;
    }

    .open-tab {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 5;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .camera-hint {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
      max-width: 90%;
      padding: 14px 18px;
      text-align: center;
      font-size: 15px;
      line-height: 1.4;
      background: rgba(20, 30, 34, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
    }

    .camera-hint.visible {
      display: block;
    }

    .square-box {
      width: min(33%, 200px);
      height: 0;
      padding-top: min(33%, 200px);
      position: absolute;
      right: 10px;
      top: 10px;
      z-index: 2;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .square-box {
        width: 28%;
        padding-top: 28%;
        right: 8px;
        top: 8px;
      }
    }

    .landmark-grid-container {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: #99999999;
    }
  </style>
</head>
<body>
  <div class="container">
    <video class="input_video"></video>
    <canvas class="output_canvas" width="1280" height="720"></canvas>
    <div class="loading">
      <div class="spinner"></div>
      <div class="message">Loading</div>
    </div>
    <div class="shoutout">
      <a href="https://developers.google.com/mediapipe/solutions/vision/hand_landmarker">MediaPipe Hands</a>
    </div>
  </div>
  <div class="control-panel"></div>
  <div class="square-box">
    <div class="landmark-grid-container"></div>
  </div>
  <p class="camera-hint" id="camera-hint" role="status">
    Allow camera access when prompted. If the feed stays black,
    <a href="." target="_blank" rel="noopener">open this demo in a new tab</a>.
  </p>
  <a class="open-tab" href="." target="_blank" rel="noopener">Open in new tab</a>

  <script type="module">
    import DeviceDetector from 'https://esm.sh/device-detector-js@2.2.10';

    const mpHands = window;
    const drawingUtils = window;
    const controls = window;
    const controls3d = window;

    testSupport([{ client: 'Chrome' }]);

    function testSupport(supportedDevices) {
      const deviceDetector = new DeviceDetector();
      const detectedDevice = deviceDetector.parse(navigator.userAgent);
      let isSupported = false;
      for (const device of supportedDevices) {
        if (device.client !== undefined) {
          const re = new RegExp(`^${device.client}$`);
          if (!re.test(detectedDevice.client.name)) continue;
        }
        if (device.os !== undefined) {
          const re = new RegExp(`^${device.os}$`);
          if (!re.test(detectedDevice.os.name)) continue;
        }
        isSupported = true;
        break;
      }
      if (!isSupported) {
        console.warn(
          `MediaPipe Hands: ${detectedDevice.client.name}/${detectedDevice.os.name} may be unsupported. Chrome desktop is recommended.`
        );
      }
    }

    const cameraHint = document.getElementById('camera-hint');
    const inIframe = window.self !== window.top;
    if (inIframe) {
      cameraHint.classList.add('visible');
      window.setTimeout(() => cameraHint.classList.remove('visible'), 12000);
    }

    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const controlsElement = document.querySelector('.control-panel');
    const canvasCtx = canvasElement.getContext('2d');

    const config = {
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands@${mpHands.VERSION}/${file}`,
    };

    const fpsControl = new controls.FPS();
    const spinner = document.querySelector('.loading');
    spinner.ontransitionend = () => {
      spinner.style.display = 'none';
    };

    const landmarkContainer = document.querySelector('.landmark-grid-container');
    const grid = new controls3d.LandmarkGrid(landmarkContainer, {
      connectionColor: 0xcccccc,
      definedColors: [
        { name: 'Left', value: 0xffa500 },
        { name: 'Right', value: 0x00ffff },
      ],
      range: 0.2,
      fitToGrid: false,
      labelSuffix: 'm',
      landmarkSize: 2,
      numCellsPerAxis: 4,
      showHidden: false,
      centered: false,
    });

    function onResults(results) {
      document.body.classList.add('loaded');
      cameraHint.classList.remove('visible');
      fpsControl.tick();

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiHandLandmarks && results.multiHandedness) {
        for (let index = 0; index < results.multiHandLandmarks.length; index++) {
          const classification = results.multiHandedness[index];
          const isRightHand = classification.label === 'Right';
          const landmarks = results.multiHandLandmarks[index];
          drawingUtils.drawConnectors(canvasCtx, landmarks, mpHands.HAND_CONNECTIONS, {
            color: isRightHand ? '#00FF00' : '#FF0000',
          });
          drawingUtils.drawLandmarks(canvasCtx, landmarks, {
            color: isRightHand ? '#00FF00' : '#FF0000',
            fillColor: isRightHand ? '#FF0000' : '#00FF00',
            radius: (data) => drawingUtils.lerp(data.from.z, -0.15, 0.1, 10, 1),
          });
        }
      }
      canvasCtx.restore();

      if (results.multiHandWorldLandmarks) {
        const landmarks = results.multiHandWorldLandmarks.reduce(
          (prev, current) => [...prev, ...current],
          []
        );
        const colors = [];
        let connections = [];
        for (let loop = 0; loop < results.multiHandWorldLandmarks.length; ++loop) {
          const offset = loop * mpHands.HAND_CONNECTIONS.length;
          const offsetConnections = mpHands.HAND_CONNECTIONS.map((connection) => [
            connection[0] + offset,
            connection[1] + offset,
          ]);
          connections = connections.concat(offsetConnections);
          const classification = results.multiHandedness[loop];
          colors.push({
            list: offsetConnections.map((unused, i) => i + offset),
            color: classification.label,
          });
        }
        grid.updateLandmarks(landmarks, connections, colors);
      } else {
        grid.updateLandmarks([]);
      }
    }

    const hands = new mpHands.Hands(config);
    hands.onResults(onResults);

    new controls
      .ControlPanel(controlsElement, {
        selfieMode: true,
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      })
      .add([
        new controls.StaticText({ title: 'MediaPipe Hands' }),
        fpsControl,
        new controls.Toggle({ title: 'Selfie Mode', field: 'selfieMode' }),
        new controls.SourcePicker({
          onFrame: async (input, size) => {
            const aspect = size.height / size.width;
            let width;
            let height;
            if (window.innerWidth > window.innerHeight) {
              height = window.innerHeight;
              width = height / aspect;
            } else {
              width = window.innerWidth;
              height = width * aspect;
            }
            canvasElement.width = width;
            canvasElement.height = height;
            await hands.send({ image: input });
          },
        }),
        new controls.Slider({
          title: 'Max Number of Hands',
          field: 'maxNumHands',
          range: [1, 4],
          step: 1,
        }),
        new controls.Slider({
          title: 'Model Complexity',
          field: 'modelComplexity',
          discrete: ['Lite', 'Full'],
        }),
        new controls.Slider({
          title: 'Min Detection Confidence',
          field: 'minDetectionConfidence',
          range: [0, 1],
          step: 0.01,
        }),
        new controls.Slider({
          title: 'Min Tracking Confidence',
          field: 'minTrackingConfidence',
          range: [0, 1],
          step: 0.01,
        }),
      ])
      .on((options) => {
        videoElement.classList.toggle('selfie', options.selfieMode);
        hands.setOptions(options);
      });
  </script>
</body>
</html>
